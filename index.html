<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>서울 25구 퍼즐 — 통합사회1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Black+Han+Sans&display=swap');

:root {
  --bg: #f7f3ed;
  --surface: #ffffff;
  --border: #ddd5c8;
  --ink: #1a1208;
  --dim: #8a7a6a;
  --gold: #c8860a;
  --correct: #2e7d4f;
  --wrong: #c0392b;
  --accent: #2c5f8a;
  --han: #7ab3d4;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100dvh; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); }

/* ── 헤더 ── */
#hdr {
  height: 52px; background: var(--ink);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; flex-shrink: 0;
  border-bottom: 3px solid var(--gold);
}
#hdr h1 { font-family: 'Black Han Sans', sans-serif; font-size: clamp(13px,2.2vw,20px); color: var(--gold); letter-spacing: .05em; }
#hdr .sub { font-size: 9px; color: rgba(255,255,255,.4); margin-top: 1px; }
.hstats { display: flex; gap: 16px; align-items: center; }
.stat { display: flex; flex-direction: column; align-items: center; line-height: 1.1; }
.stat .v { font-family: 'Black Han Sans', sans-serif; font-size: 19px; color: #f0d060; }
.stat .l { font-size: 9px; color: rgba(255,255,255,.45); letter-spacing: .05em; }
#timer-display { font-family: 'Black Han Sans', sans-serif; font-size: 22px; color: #f0d060; min-width: 60px; text-align: center; }

/* 진행바 */
#pgbar { height: 4px; background: rgba(0,0,0,.08); flex-shrink: 0; }
#pgfill { height: 100%; background: linear-gradient(90deg, #2c5f8a, #c8860a); width: 0%; transition: width .5s; }

/* ── 게임 레이아웃 ── */
#game { display: flex; height: calc(100dvh - 56px); overflow: hidden; }

/* ── 지도 ── */
#map-area { flex: 1; position: relative; overflow: hidden; background: #eee8dc; }
#map-svg { width: 100%; height: 100%; display: block; }

.dz {
  stroke: rgba(255,255,255,0.7); stroke-width: 1.2;
  cursor: default; opacity: 0.82;
  transition: opacity .15s, stroke-width .15s, stroke .15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.15));
}
.dz.hov { opacity: 1; stroke: white; stroke-width: 2.5; filter: drop-shadow(0 2px 6px rgba(0,0,0,.3)); }
.dz.ok { opacity: 1; stroke: white; stroke-width: 2; filter: drop-shadow(0 2px 4px rgba(0,0,0,.2)); }
.dz.bad { stroke: #fff; stroke-width: 2.5; animation: badflash .4s; }

@keyframes badflash {
  0%,100% { filter: drop-shadow(0 0 0px red); }
  50% { filter: drop-shadow(0 0 12px red); }
}

.lbl {
  font-family: 'Noto Sans KR', sans-serif; font-size: 9.5px; font-weight: 700;
  fill: rgba(0,0,0,0); text-anchor: middle; dominant-baseline: middle;
  pointer-events: none; user-select: none; transition: fill .3s;
  text-shadow: 0 1px 2px rgba(0,0,0,.3);
}
.lbl.ok { fill: rgba(0,0,0,0.75); font-size: 10px; }

.han { fill: var(--han); opacity: .75; pointer-events: none; }

/* ── 조각 패널 ── */
#panel { width: 175px; flex-shrink: 0; background: var(--surface); border-left: 1.5px solid var(--border); display: flex; flex-direction: column; }
#phdr { padding: 9px 12px 7px; border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 700; color: var(--dim); letter-spacing: .08em; display: flex; justify-content: space-between; align-items: center; }
#pcount { font-family: 'Black Han Sans', sans-serif; font-size: 15px; color: var(--gold); }
#pieces { flex: 1; overflow-y: auto; padding: 7px; display: flex; flex-direction: column; gap: 4px; }
#pieces::-webkit-scrollbar { width: 3px; }
#pieces::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.piece {
  height: 33px; border: 1.5px solid; border-radius: 6px;
  display: flex; align-items: center; padding: 0 10px;
  cursor: grab; user-select: none; touch-action: none;
  font-size: 12.5px; font-weight: 700; color: #1a1208;
  transition: transform .1s, opacity .2s, box-shadow .1s;
  flex-shrink: 0;
}
.piece:hover { transform: translateX(3px); box-shadow: 2px 2px 6px rgba(0,0,0,.15); }
.piece.drag { opacity: .3; cursor: grabbing; }
.piece.gone { display: none; }

/* ── 유령 ── */
#ghost {
  position: fixed; pointer-events: none; z-index: 9999;
  background: white; border: 2px solid var(--accent);
  border-radius: 8px; padding: 6px 14px;
  font-family: 'Noto Sans KR', sans-serif; font-weight: 700; font-size: 13px; color: var(--accent);
  box-shadow: 0 8px 24px rgba(0,0,0,.25);
  white-space: nowrap; transform: translate(-50%,-50%) rotate(-2deg);
  display: none;
}

/* ── 피드백 ── */
#fb {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(.5); opacity: 0; pointer-events: none;
  font-family: 'Black Han Sans', sans-serif; font-size: 26px;
  padding: 13px 30px; border-radius: 12px; z-index: 10000;
  transition: transform .18s cubic-bezier(.34,1.56,.64,1), opacity .12s;
  letter-spacing: .05em;
}
#fb.show { transform: translate(-50%,-50%) scale(1); opacity: 1; }
#fb.ok { background: var(--correct); color: #fff; }
#fb.bad { background: var(--wrong); color: #fff; }

/* ── 완료 모달 ── */
#done {
  display: none; position: fixed; inset: 0;
  background: rgba(10,8,4,.85); backdrop-filter: blur(8px);
  z-index: 10001; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
}
#done.show { display: flex; }
.done-card {
  background: white; border: 3px solid var(--gold);
  border-radius: 20px; padding: 36px 52px; text-align: center;
  box-shadow: 0 32px 80px rgba(0,0,0,.5); max-width: 420px; width: 90%;
}
.done-card h2 { font-family: 'Black Han Sans', sans-serif; font-size: 28px; color: var(--ink); margin-bottom: 6px; }
.done-stat { display: flex; gap: 32px; justify-content: center; margin: 18px 0; }
.done-stat div { display: flex; flex-direction: column; align-items: center; }
.done-stat .dv { font-family: 'Black Han Sans', sans-serif; font-size: 42px; color: var(--correct); line-height: 1; }
.done-stat .dl { font-size: 11px; color: var(--dim); margin-top: 2px; }

/* 이름 입력 */
#name-input {
  width: 100%; padding: 10px 14px; border: 2px solid var(--border);
  border-radius: 8px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px; font-weight: 700; text-align: center;
  outline: none; margin: 8px 0;
}
#name-input:focus { border-color: var(--accent); }
.btn-submit {
  background: var(--gold); color: white; border: none;
  font-family: 'Black Han Sans', sans-serif; font-size: 16px;
  padding: 11px 32px; border-radius: 9px; cursor: pointer;
  letter-spacing: .06em; transition: background .15s; width: 100%; margin-top: 4px;
}
.btn-submit:hover { background: #a06d08; }
.btn-restart {
  background: var(--ink); color: #f0d060; border: none;
  font-family: 'Black Han Sans', sans-serif; font-size: 14px;
  padding: 9px 24px; border-radius: 8px; cursor: pointer;
  letter-spacing: .06em; margin-top: 6px;
}

/* ── 랭킹 패널 ── */
#ranking {
  background: white; border: 2px solid var(--border);
  border-radius: 16px; padding: 20px 28px;
  max-width: 420px; width: 90%; max-height: 50dvh; overflow-y: auto;
}
#ranking h3 { font-family: 'Black Han Sans', sans-serif; font-size: 18px; color: var(--ink); margin-bottom: 12px; text-align: center; }
.rank-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 0; border-bottom: 1px solid #f0ebe0;
  font-size: 13px; font-weight: 700;
}
.rank-row:last-child { border-bottom: none; }
.rank-num { font-family: 'Black Han Sans', sans-serif; font-size: 16px; color: var(--dim); min-width: 28px; }
.rank-num.gold { color: #c8a000; }
.rank-num.silver { color: #888; }
.rank-num.bronze { color: #a0622a; }
.rank-name { flex: 1; color: var(--ink); }
.rank-time { color: var(--accent); font-family: 'Black Han Sans', sans-serif; }
.rank-tries { color: var(--dim); font-size: 11px; }
.rank-me { background: #fff8e8; border-radius: 6px; padding: 2px 6px; }
</style>
</head>

const NAMES = Object.keys(DISTRICT_DATA);
let correct=0, tries=0, drag=null, lastHov=null;
let timerSec=0, timerInterval=null, gameStarted=false;
let finalTimeSec=0;
const ghost=document.getElementById('ghost');

// ── 타이머 ──
function startTimer(){
  if(gameStarted) return;
  gameStarted=true;
  timerInterval=setInterval(()=>{
    timerSec++;
    const m=String(Math.floor(timerSec/60)).padStart(2,'0');
    const s=String(timerSec%60).padStart(2,'0');
    document.getElementById('timer-display').textContent=`${m}:${s}`;
  },1000);
}
function stopTimer(){
  clearInterval(timerInterval);
  finalTimeSec=timerSec;
}
function fmtTime(sec){
  const m=Math.floor(sec/60), s=sec%60;
  return `${m}분 ${s}초`;
}

// ── 지도 구축 ──
function buildMap(){
  const dg=document.getElementById('dzones'), lg=document.getElementById('lbls');
  dg.innerHTML=''; lg.innerHTML='';
  NAMES.forEach(n=>{
    const d=DISTRICT_DATA[n], color=COLORS[n]||'#888';
    const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points',d.pts);
    p.setAttribute('class','dz');
    p.setAttribute('fill',color);
    p.dataset.n=n;
    dg.appendChild(p);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',d.cx); t.setAttribute('y',d.cy);
    t.setAttribute('class','lbl'); t.dataset.n=n; t.textContent='';
    lg.appendChild(t);
  });
}

// ── 조각 구축 ──
function buildPieces(){
  const c=document.getElementById('pieces'); c.innerHTML='';
  [...NAMES].sort(()=>Math.random()-.5).forEach(n=>{
    const color=COLORS[n]||'#888';
    // 밝은 배경색 계산
    const el=document.createElement('div');
    el.className='piece'; el.textContent=n; el.dataset.n=n;
    el.style.background=color+'22';
    el.style.borderColor=color;
    el.style.color=darken(color);
    el.addEventListener('mousedown',onMD);
    el.addEventListener('touchstart',onTS,{passive:false});
    c.appendChild(el);
  });
}

function darken(hex){
  // 색상을 조금 더 어둡게
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-60)},${Math.max(0,g-60)},${Math.max(0,b-60)})`;
}

// ── 드래그 ──
function startDrag(el,x,y){
  startTimer();
  drag=el; el.classList.add('drag');
  ghost.textContent=el.dataset.n; ghost.style.display='block';
  moveGhost(x,y); updateHov(x,y);
}
function moveGhost(x,y){ ghost.style.left=x+'px'; ghost.style.top=y+'px'; updateHov(x,y); }

function updateHov(x,y){
  const h=hitName(x,y);
  if(h===lastHov) return;
  if(lastHov){ const e=document.querySelector(`.dz[data-n="${lastHov}"]`); if(e&&!e.classList.contains('ok')) e.classList.remove('hov'); }
  if(h){ const e=document.querySelector(`.dz[data-n="${h}"]`); if(e&&!e.classList.contains('ok')) e.classList.add('hov'); }
  lastHov=h;
}

function endDrag(x,y){
  if(!drag) return;
  ghost.style.display='none'; drag.classList.remove('drag');
  if(lastHov){ const e=document.querySelector(`.dz[data-n="${lastHov}"]`); if(e&&!e.classList.contains('ok')) e.classList.remove('hov'); lastHov=null; }
  const h=hitName(x,y), pn=drag.dataset.n;
  tries++;
  if(h===pn){
    correct++;
    const dz=document.querySelector(`.dz[data-n="${pn}"]`);
    dz.classList.add('ok');
    const t=document.querySelector(`.lbl[data-n="${pn}"]`);
    t.textContent=pn; t.classList.add('ok');
    drag.classList.add('gone');
    showFb(true,pn);
  } else if(h){
    showFb(false,null);
    const e=document.querySelector(`.dz[data-n="${h}"]`);
    e.classList.add('bad');
    setTimeout(()=>e.classList.remove('bad'),500);
  } else { showFb(false,null); }
  drag=null; updateStats();
  if(correct===NAMES.length){
    stopTimer();
    setTimeout(showDone,700);
  }
}

function hitName(cx,cy){
  const r=document.getElementById('map-area').getBoundingClientRect();
  const vw=780,vh=680,pw=r.width,ph=r.height;
  const sc=Math.min(pw/vw,ph/vh);
  const ox=(pw-vw*sc)/2, oy=(ph-vh*sc)/2;
  const sx=(cx-r.left-ox)/sc, sy=(cy-r.top-oy)/sc;
  for(const n of NAMES){ if(pip(sx,sy,DISTRICT_DATA[n].pts)) return n; }
  return null;
}
function pip(x,y,pts){
  const ps=pts.trim().split(' ').map(p=>p.split(',').map(Number));
  let inside=false;
  for(let i=0,j=ps.length-1;i<ps.length;j=i++){
    const [xi,yi]=ps[i],[xj,yj]=ps[j];
    if((yi>y)!==(yj>y)&&x<(xj-xi)*(y-yi)/(yj-yi)+xi) inside=!inside;
  }
  return inside;
}

let fbT=null;
function showFb(ok,name){
  const e=document.getElementById('fb');
  e.className=ok?'ok':'bad';
  e.textContent=ok?`✓ ${name}`:'✗ 다시 시도';
  e.classList.add('show');
  clearTimeout(fbT); fbT=setTimeout(()=>e.classList.remove('show'),850);
}

function updateStats(){
  document.getElementById('nc').textContent=correct;
  document.getElementById('nt').textContent=tries;
  document.getElementById('pgfill').style.width=(correct/NAMES.length*100)+'%';
  document.getElementById('pcount').textContent=NAMES.length-correct;
}

async function showDone(){
  document.getElementById('f-time').textContent=fmtTime(finalTimeSec);
  document.getElementById('f-try').textContent=tries+'회';
  document.getElementById('done').classList.add('show');
  await loadRanking();
}

// ── Firebase 랭킹 ──
async function submitRanking(){
  const name=document.getElementById('name-input').value.trim();
  if(!name){ alert('이름을 입력해주세요!'); return; }
  if(!window._db){ alert('랭킹 서버에 연결 중입니다. 잠시 후 다시 시도해주세요.'); return; }
  try{
    await window._addDoc(window._col, {
      name, time: finalTimeSec, tries,
      timeStr: fmtTime(finalTimeSec),
      createdAt: new Date()
    });
    await loadRanking(name);
    document.querySelector('.btn-submit').textContent='✅ 등록 완료!';
    document.querySelector('.btn-submit').disabled=true;
  }catch(e){
    alert('등록 중 오류가 발생했습니다: '+e.message);
  }
}

async function loadRanking(myName=''){
  const list=document.getElementById('rank-list');
  list.innerHTML='<p style="text-align:center;color:#aaa;font-size:13px">불러오는 중...</p>';
  if(!window._db) return;
  try{
    const q=window._query(window._col, window._orderBy('time','asc'), window._limit(20));
    const snap=await window._getDocs(q);
    if(snap.empty){ list.innerHTML='<p style="text-align:center;color:#aaa;font-size:13px">아직 기록이 없어요!</p>'; return; }
    const medals=['🥇','🥈','🥉'];
    const medalClass=['gold','silver','bronze'];
    list.innerHTML='';
    snap.docs.forEach((doc,i)=>{
      const d=doc.data();
      const isMe=myName&&d.name===myName;
      const row=document.createElement('div');
      row.className='rank-row'+(isMe?' rank-me':'');
      row.innerHTML=`
        <span class="rank-num ${medalClass[i]||''}">${medals[i]||i+1}</span>
        <span class="rank-name">${d.name}${isMe?' 👈':''}</span>
        <span class="rank-time">${d.timeStr||fmtTime(d.time)}</span>
        <span class="rank-tries">${d.tries}회</span>
      `;
      list.appendChild(row);
    });
  }catch(e){
    list.innerHTML='<p style="text-align:center;color:#e05;">랭킹을 불러올 수 없습니다.</p>';
  }
}

window.submitRanking=submitRanking;

function restart(){
  correct=0; tries=0; timerSec=0; gameStarted=false; finalTimeSec=0;
  clearInterval(timerInterval);
  document.getElementById('timer-display').textContent='00:00';
  document.getElementById('done').classList.remove('show');
  document.querySelector('.btn-submit').textContent='🏆 랭킹 등록';
  document.querySelector('.btn-submit').disabled=false;
  document.getElementById('name-input').value='';
  buildMap(); buildPieces(); updateStats();
}
window.restart=restart;

function onMD(e){ e.preventDefault(); startDrag(e.currentTarget,e.clientX,e.clientY); }
document.addEventListener('mousemove',e=>{ if(drag) moveGhost(e.clientX,e.clientY); });
document.addEventListener('mouseup',e=>{ if(drag) endDrag(e.clientX,e.clientY); });
function onTS(e){ e.preventDefault(); const t=e.touches[0]; startDrag(e.currentTarget,t.clientX,t.clientY); }
document.addEventListener('touchmove',e=>{ if(!drag) return; e.preventDefault(); const t=e.touches[0]; moveGhost(t.clientX,t.clientY); },{passive:false});
document.addEventListener('touchend',e=>{ if(!drag) return; const t=e.changedTouches[0]; endDrag(t.clientX,t.clientY); });

buildMap(); buildPieces(); updateStats();
</script>
